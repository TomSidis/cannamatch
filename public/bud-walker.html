<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bud Walker</title>
<style>
  html, body { margin:0; padding:0; overflow:hidden; background:#0d1c14; }
  #stage { display:block; width:100%; height:100vh; }
</style>
</head>
<body>
<canvas id="stage"></canvas>
<script>
const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

const sheet = new Image();
sheet.src = "./Gemini_Generated_Image_5u19do5u19do5u19.png";

const COLS = 3, ROWS = 2;
let frameW = 0, frameH = 0;

const SLICE = {
  legL:  { x:0.00, y:0.68, w:0.50, h:0.32 },
  legR:  { x:0.50, y:0.68, w:0.50, h:0.32 },
  torso: { x:0.18, y:0.00, w:0.64, h:0.70 },
  armL:  { x:0.00, y:0.30, w:0.22, h:0.45 },
  armR:  { x:0.78, y:0.30, w:0.22, h:0.45 },
};

let x = 0, dir = 1, charW = 0, charH = 0, t = 0;
let frameIndex = 0, frameTimer = 0;
const FRAME_INTERVAL = 0.18;
const SPEED = 90;

function drawPart(part, scale, pivotXFrac, pivotYFrac, angle, flip) {
  const sx = part.x * frameW;
  const sy = part.y * frameH;
  const sw = part.w * frameW;
  const sh = part.h * frameH;
  const dw = sw * scale;
  const dh = sh * scale;
  const pivotX = pivotXFrac * dw;
  const pivotY = pivotYFrac * dh;

  ctx.save();
  ctx.translate(flip ? -pivotX : pivotX, pivotY);
  ctx.rotate(angle);
  ctx.drawImage(
    sheet,
    sx, sy, sw, sh,
    -pivotX, -pivotY, dw, dh
  );
  ctx.restore();
}

function update(dt) {
  frameTimer += dt;
  if (frameTimer >= FRAME_INTERVAL) {
    frameTimer = 0;
    frameIndex = (frameIndex + 1) % COLS;
  }

  x += dir * SPEED * dt;

  if (x + charW >= canvas.width) {
    x = canvas.width - charW;
    dir = -1;
  } else if (x <= 0) {
    x = 0;
    dir = 1;
  }

  t += dt;
}

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const groundY = canvas.height - charH - 10;
  const swing = Math.sin(t * 9) * 0.45;
  const armSwing = Math.sin(t * 9) * 0.5;
  const bob = Math.abs(Math.sin(t * 9)) * 6;

  const baseSX = frameIndex * frameW;

  ctx.save();
  ctx.translate(x, groundY - bob);

  const flip = dir < 0;
  if (flip) {
    ctx.translate(charW, 0);
    ctx.scale(-1, 1);
  }

  ctx.save();
  ctx.translate(0, charH);
  drawPart(
    { x: (SLICE.legL.x * frameW + baseSX) / frameW, y: SLICE.legL.y, w: SLICE.legL.w, h: SLICE.legL.h },
    charW / frameW, 0.5, 0, swing, false
  );
  ctx.restore();

  ctx.save();
  ctx.translate(charW * 0.5, charH);
  drawPart(
    { x: (SLICE.legR.x * frameW + baseSX) / frameW, y: SLICE.legR.y, w: SLICE.legR.w, h: SLICE.legR.h },
    charW / frameW, 0.5, 0, -swing, false
  );
  ctx.restore();

  drawPart(
    { x: (SLICE.torso.x * frameW + baseSX) / frameW, y: SLICE.torso.y, w: SLICE.torso.w, h: SLICE.torso.h },
    charW / frameW, 0, 0, 0, false
  );

  ctx.save();
  ctx.translate(0, charH * 0.30);
  drawPart(
    { x: (SLICE.armL.x * frameW + baseSX) / frameW, y: SLICE.armL.y, w: SLICE.armL.w, h: SLICE.armL.h },
    charW / frameW, 0.5, 0, -armSwing, false
  );
  ctx.restore();

  ctx.save();
  ctx.translate(charW * 0.78, charH * 0.30);
  drawPart(
    { x: (SLICE.armR.x * frameW + baseSX) / frameW, y: SLICE.armR.y, w: SLICE.armR.w, h: SLICE.armR.h },
    charW / frameW, 0.5, 0, armSwing, false
  );
  ctx.restore();

  ctx.restore();
}

let last = performance.now();
function loop(now) {
  const dt = Math.min((now - last) / 1000, 0.05);
  last = now;

  if (frameW > 0) {
    update(dt);
    render();
  }

  requestAnimationFrame(loop);
}

sheet.onload = () => {
  frameW = sheet.width / COLS;
  frameH = sheet.height / ROWS;
  charW = Math.min(160, canvas.width * 0.12);
  charH = charW * (frameH / frameW);
  x = 0;
  requestAnimationFrame(loop);
};
</script>
</body>
</html>
