services:
  db:
    image: pgvector/pgvector:pg16          # PostgreSQL 16 + pgvector מובנה
    container_name: cannamatch_db
    environment:
      POSTGRES_USER: cannamatch
      POSTGRES_PASSWORD: cannamatch
      POSTGRES_DB: cannamatch
    ports:
      - "5432:5432"
    volumes:
      - cannamatch_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cannamatch"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  cannamatch_pgdata:
